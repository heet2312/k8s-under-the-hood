# 03-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: taskflow-mongo
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow
    app: mongo
spec:
  serviceName: taskflow-mongo  # Required: links to the headless Service for stable DNS
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: taskflow
      app: mongo

  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskflow
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false

          ports:
            - containerPort: 27017

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db   # MongoDB stores all data here; must persist across restarts

      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: taskflow-mongo-pvc
