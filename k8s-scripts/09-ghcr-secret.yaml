# 09-ghcr-secret.yaml
# Kubernetes imagePullSecret for GitHub Container Registry (GHCR).
# This secret allows Kubernetes nodes to pull private images from ghcr.io.
#
# ⚠️  DO NOT apply this file directly — the token value must be filled in first.
#     See docs/09-cicd.md for the full step-by-step guide.
#
# Create this secret with kubectl (recommended — avoids storing the token in YAML):
#
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<YOUR_GITHUB_USERNAME> \
#     --docker-password=<YOUR_GHCR_TOKEN> \
#     --docker-email=<YOUR_EMAIL> \
#     --namespace=taskflow
#
# Reference file format (for GitOps / sealed-secrets workflows only):
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: taskflow
type: kubernetes.io/dockerconfigjson
data:
  # Generate the value with:
  #   kubectl create secret docker-registry ghcr-pull-secret ... --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  .dockerconfigjson: REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG
