# 02-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow
    app.kubernetes.io/instance: taskflow
    app: api
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Allow 1 extra pod during the update
      maxUnavailable: 0    # Never take down a pod before its replacement is ready

  selector:
    matchLabels:
      app.kubernetes.io/name: taskflow
      app.kubernetes.io/instance: taskflow
      app: api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskflow
        app.kubernetes.io/instance: taskflow
        app: api
      annotations:
        # sha256 of the ConfigMap/Secret content — changes here trigger a rolling restart
        checksum/config: "abc123..."
        checksum/secret: "def456..."

    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret   # Created via kubectl — see docs/09-cicd.md
      containers:
        - name: api
          image: ghcr.io/senghaniheet/taskflow-api:v1.0.0
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: taskflow-api-config   # loads NODE_ENV, PORT, LOG_LEVEL, etc.
            - secretRef:
                name: taskflow-api-secret   # loads JWT_SECRET, MONGO_URI

          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 8
            successThreshold: 1
            failureThreshold: 5
