services:
  # ─────────────────────────────────────────────────────────
  # MongoDB Database
  # ─────────────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: taskflow_mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow_network

  # ─────────────────────────────────────────────────────────
  # Express.js Backend Server
  # ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: taskflow-api:latest
    container_name: taskflow_server
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/taskflow}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - DISABLE_RATE_LIMIT=${DISABLE_RATE_LIMIT:-false}
    depends_on:
      - mongo
    networks:
      - taskflow_network

  # ─────────────────────────────────────────────────────────
  # React+Vite Frontend Client (Served by Nginx)
  # ─────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: taskflow-web:latest
    container_name: taskflow_client
    restart: always
    ports:
      - '3000:80' # Maps host port 3000 to Nginx container port 80
    depends_on:
      - api
    networks:
      - taskflow_network

volumes:
  mongo_data:
    name: taskflow_mongo_data

networks:
  taskflow_network:
    name: taskflow_network
    driver: bridge
