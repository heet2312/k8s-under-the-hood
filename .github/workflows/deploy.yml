name: Deploy TaskFlow

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write   # Required to push images to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          clean: true

      # ── Authenticate to GHCR ─────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Generate image metadata (tags + OCI labels) ──────────────────────
      - name: Extract Docker metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,format=long          # ghcr.io/…/taskflow-api:sha-<full-sha>
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract Docker metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,format=long          # ghcr.io/…/taskflow-web:sha-<full-sha>
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Set up Docker Buildx (multi-platform / cache support) ────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push API image ────────────────────────────────────────────
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & push Web image ────────────────────────────────────────────
      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Export the SHA tag for downstream jobs ────────────────────────────
      - name: Export image tag
        id: meta
        run: echo "version=sha-${{ github.sha }}" >> $GITHUB_OUTPUT

  # ── Package & publish Helm chart to GHCR OCI registry ─────────────────────
  package-helm:
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Package Helm chart
        run: |
          helm package helm/taskflow \
            --app-version "sha-${{ github.sha }}" \
            --version "0.1.0-${{ github.run_number }}"

      - name: Push Helm chart to GHCR
        run: |
          helm push taskflow-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts