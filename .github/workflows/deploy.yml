name: Deploy TaskFlow

on:
  push:
    branches:
      - main
    tags:
      - "v*"         # Trigger on version tags: v1.0.0, v1.0.1, etc.

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/taskflow-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write   # Required to push images to GHCR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          clean: true

      # ── Authenticate to GHCR ─────────────────────────────────────────────
      # GHCR_TOKEN = GitHub PAT with write:packages + read:packages scopes
      # Add it in: GitHub repo → Settings → Secrets → Actions → New secret
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── Generate image metadata (semver tags + OCI labels) ───────────────
      # On a tag push (v1.0.0):  tags = v1.0.0, v1.0, v1, latest
      # On a branch push (main): tags = main
      - name: Extract Docker metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}        # v1.0.0
            type=semver,pattern={{major}}.{{minor}} # v1.0
            type=semver,pattern={{major}}           # v1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract Docker metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Set up Docker Buildx ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push API image ────────────────────────────────────────────
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & push Web image ────────────────────────────────────────────
      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Enforce private visibility on both packages ───────────────────────
      # GitHub API: set package visibility to private after every push.
      # Requires GHCR_TOKEN to have write:packages scope.
      - name: Set packages to private
        run: |
          for PKG in taskflow-api taskflow-web; do
            curl -s -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GHCR_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/packages/container/${PKG}" \
              -d '{"visibility":"private"}'
          done