{{- if $.Values.api.pdb.enabled }}
{{- range $color, $config := .Values.api.deployments }}
{{- if $config.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "taskflow.fullname" $ }}-api-{{ $color }}
  namespace: {{ $.Values.namespace | default $.Release.Namespace }}
  labels:
    {{- include "taskflow.labels" $ | nindent 4 }}
    app: api
    color: {{ $color }}
spec:
  {{- if $.Values.api.pdb.minAvailable }}
  minAvailable: {{ $.Values.api.pdb.minAvailable }}
  {{- end }}
  {{- if $.Values.api.pdb.maxUnavailable }}
  maxUnavailable: {{ $.Values.api.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "taskflow.selectorLabels" $ | nindent 6 }}
      app: api
      color: {{ $color }}
{{- end }}
{{- end }}
{{- end }}
