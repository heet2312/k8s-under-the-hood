apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "taskflow.labels" . | nindent 4 }}
    app: api
spec:
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  selector:
    {{- include "taskflow.selectorLabels" . | nindent 4 }}
    app: api
    color: {{ .Values.api.productionTarget }}
  type: ClusterIP
